repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bunx prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, markdown, yaml]
      - id: oxlint
        name: oxlint
        entry: bunx oxlint
        language: system
        types_or: [javascript, jsx, ts, tsx]
      - id: typecheck
        name: typecheck
        entry: bun run typecheck
        language: system
        pass_filenames: false
